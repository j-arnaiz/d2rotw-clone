services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file: .env
    depends_on:
      - redis

  worker:
    build: .
    command: bundle exec sidekiq
    env_file: .env
    depends_on:
      - redis

volumes:
  redis_data:
